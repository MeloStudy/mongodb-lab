services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    container_name: mongodb_lab_016
    ports:
      - "27017:27017"
    environment:
      # Disabling auth for local educational environments until Security Module
      MONGO_INITDB_DATABASE: search_db
    volumes:
      # Optional init script mounting point
      - ./init:/docker-entrypoint-initdb.d
    # Ephemeral testing environment (No permanent data volume mounted)
